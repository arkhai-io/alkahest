name: Publish SDKs

on:
  push:
    branches: [main]
    paths: ['sdks/**']
  workflow_dispatch:

concurrency:
  group: publish-sdks
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

# Required secrets:
#   NPM_TOKEN           - npm access token for publishing alkahest-ts
#   CARGO_REGISTRY_TOKEN - crates.io API token for publishing alkahest-rs
#   PYPI_API_TOKEN       - PyPI API token for publishing alkahest-py

jobs:
  # ──────────────────────────────────────────────
  # Detect which SDKs have changed files
  # ──────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ts }}
      rs: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.rs }}
      py: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.py }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            ts:
              - 'sdks/ts/**'
            rs:
              - 'sdks/rs/**'
            py:
              - 'sdks/py/**'
              - 'sdks/rs/**'

  # ──────────────────────────────────────────────
  # TypeScript → npm
  # ──────────────────────────────────────────────
  publish-npm:
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check if version already published
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view alkahest-ts version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "::notice::alkahest-ts v$LOCAL already on npm — skipping publish"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::alkahest-ts v$LOCAL → npm (current: v$REMOTE)"
          fi

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────
  # Rust → crates.io
  # ──────────────────────────────────────────────
  publish-cargo:
    needs: detect-changes
    if: needs.detect-changes.outputs.rs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Check if version already published
        id: version
        run: |
          LOCAL=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          REMOTE=$(cargo search alkahest-rs --limit 1 | awk -F'"' '{print $2}')
          if [ -z "$REMOTE" ]; then REMOTE="0.0.0"; fi
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "::notice::alkahest-rs v$LOCAL already on crates.io — skipping publish"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::alkahest-rs v$LOCAL → crates.io (current: v$REMOTE)"
          fi

      - name: Publish to crates.io
        if: steps.version.outputs.publish == 'true'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────
  # Python → PyPI  (maturin / PyO3 cross-platform wheels)
  # ──────────────────────────────────────────────
  check-pypi-version:
    needs: detect-changes
    if: needs.detect-changes.outputs.py == 'true'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version already published
        id: version
        run: |
          LOCAL=$(grep '^version' sdks/py/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          REMOTE=$(curl -sf https://pypi.org/pypi/alkahest-py/json | jq -r '.info.version' || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "::notice::alkahest-py v$LOCAL already on PyPI — skipping publish"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::alkahest-py v$LOCAL → PyPI (current: v$REMOTE)"
          fi

  pypi-linux:
    needs: check-pypi-version
    if: needs.check-pypi-version.outputs.publish == 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path sdks/py/Cargo.toml
          sccache: 'true'
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  pypi-musllinux:
    needs: check-pypi-version
    if: needs.check-pypi-version.outputs.publish == 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path sdks/py/Cargo.toml
          sccache: 'true'
          manylinux: musllinux_1_2
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  pypi-windows:
    needs: check-pypi-version
    if: needs.check-pypi-version.outputs.publish == 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path sdks/py/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  pypi-macos:
    needs: check-pypi-version
    if: needs.check-pypi-version.outputs.publish == 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path sdks/py/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  pypi-sdist:
    needs: check-pypi-version
    if: needs.check-pypi-version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path sdks/py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    needs: [pypi-linux, pypi-musllinux, pypi-windows, pypi-macos, pypi-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'wheels-*/*'
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
